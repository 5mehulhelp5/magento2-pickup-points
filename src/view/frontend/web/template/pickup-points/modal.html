<!-- ko if: isModalVisible() -->
<div class="innosend-pickup-points-modal">
    <!-- Header: Top Bar and Filter Bar -->
    <div class="innosend-pickup-points-modal-header">
        <!-- Top Bar: Search, Toggle, Close -->
        <div class="pickup-points-top-bar">
            <div class="pickup-points-top-bar-left">
                <div class="search-container">
                    <input type="text"
                           class="search-input"
                           data-bind="value: shippingAddressDisplay,
                                      attr: { placeholder: $t('Search address...') }"
                           readonly />
                    <!-- ko if: originalAddress -->
                    <button type="button"
                            class="reset-address-btn"
                            data-bind="click: resetToOriginalAddress,
                                       attr: { 'aria-label': $t('Reset to original address') }"
                            title="Reset to original address">
                        <span>↺</span>
                    </button>
                    <!-- /ko -->
                </div>
                <button type="button"
                        class="toggle-list-btn"
                        data-bind="click: toggleList,
                                   attr: { 'aria-label': showList() ? $t('Hide list') : $t('Show list') }">
                    <span data-bind="text: showList() ? '▼' : '▲'"></span>
                </button>
            </div>
            <div class="pickup-points-top-bar-right">
                <button type="button" class="close-btn" data-bind="click: closeModal">×</button>
            </div>
        </div>
        <!-- Filter Bar: Carrier Filters -->
        <div class="pickup-points-filter-bar">
            <!-- ko foreach: getAllowedCarriers() -->
            <label class="carrier-filter-label"
                   data-bind="css: { 'carrier-filter-active': $parent.isCarrierSelected($data) }">
                <!-- ko if: $parent.getCarrierLogoForFilter($data) -->
                <div class="carrier-filter-logo">
                    <img data-bind="attr: { 
                                     src: $parent.getCarrierLogoForFilter($data), 
                                     alt: $data 
                                   },
                                   css: { 'carrier-logo-grayscale': !$parent.isCarrierSelected($data) }" />
                </div>
                <!-- /ko -->
                <!-- ko ifnot: $parent.getCarrierLogoForFilter($data) -->
                <span data-bind="text: $data"></span>
                <!-- /ko -->
                <div class="carrier-filter-toggle">
                    <input type="checkbox"
                           class="carrier-toggle-switch"
                           data-bind="checked: $parent.isCarrierSelected($data),
                                      click: $parent.toggleCarrierFilter.bind($parent, $data)" />
                </div>
            </label>
            <!-- /ko -->
        </div>
    </div>

    <!-- Map Container (full-width, full-height) -->
    <div class="pickup-points-map-container">
        <div class="pickup-points-map" id="innosend-pickup-points-map"></div>
        
        <!-- Transparent Overlay (full-width, full-height, flex-column) -->
        <div class="pickup-points-overlay">
        <!-- Loading State -->
        <!-- ko if: isLoading() -->
        <div class="loading-overlay">
            <div class="loading-message"><!-- ko i18n: 'Loading pickup points...' --><!-- /ko --></div>
        </div>
        <!-- /ko -->

        <!-- Pickup Points List (left side, max 400px, toggleable) -->
        <!-- ko if: showList() && !isLoading() -->
        <div class="pickup-points-list-container">
            <div class="pickup-points-list">
                <!-- ko if: filteredPickupPoints().length === 0 -->
                <div class="no-results">
                    <!-- ko i18n: 'No pickup points found' --><!-- /ko -->
                </div>
                <!-- /ko -->

                <!-- ko if: filteredPickupPoints().length > 0 -->
                <!-- ko foreach: filteredPickupPoints() -->
                <div class="pickup-point-card"
                     data-bind="click: $parent.selectPickupPoint.bind($parent, $data),
                                css: { 'selected': isSelected }">
                    <div class="pickup-point-card-header">
                        <!-- ko if: logo -->
                        <div class="pickup-point-card-logo">
                            <img data-bind="attr: { src: logo, alt: carrier }" />
                        </div>
                        <!-- /ko -->
                        <div class="pickup-point-card-content">
                            <div class="pickup-point-card-content-top">
                                <div class="pickup-point-card-name" data-bind="text: name"></div>
                                <!-- ko if: distance -->
                                <div class="pickup-point-card-distance" data-bind="text: $parent.formatDistance(distance)"></div>
                                <!-- /ko -->
                            </div>
                            <div class="pickup-point-card-address" data-bind="text: address"></div>
                        </div>
                    </div>
                    <!-- ko if: isSelected -->
                    <!-- ko if: opening_hours && opening_hours.length > 0 -->
                    <div class="pickup-point-card-hours" data-bind="click: function(data, event) { if (event) { event.stopPropagation(); event.preventDefault(); } return false; }">
                        <button type="button"
                                class="toggle-hours-btn"
                                data-bind="click: function(data, event) { $parent.toggleBusinessHoursForPoint($data, event); return false; }">
                            <!-- ko if: $parent.isBusinessHoursVisibleForPoint($data)() -->
                            <span><!-- ko i18n: 'Hide Business Hours' --><!-- /ko --></span>
                            <!-- /ko -->
                            <!-- ko ifnot: $parent.isBusinessHoursVisibleForPoint($data)() -->
                            <span><!-- ko i18n: 'Show Business Hours' --><!-- /ko --></span>
                            <!-- /ko -->
                        </button>
                        <!-- ko if: $parent.isBusinessHoursVisibleForPoint($data)() -->
                        <div class="pickup-point-card-hours-content" data-bind="click: function(data, event) { if (event) { event.stopPropagation(); } }">
                            <!-- ko template: { name: 'Innosend_PickupPoints/pickup-points/opening-hours', data: { openingHours: opening_hours } } --><!-- /ko -->
                        </div>
                        <!-- /ko -->
                    </div>
                    <!-- /ko -->
                    <button type="button"
                            class="action primary choose-pickup-point-btn"
                            data-bind="click: function(data, event) { event.stopPropagation(); $parent.confirmPickupPoint.bind($parent, $data)(); }">
                        <span><!-- ko i18n: 'Choose this Pickup Point' --><!-- /ko --></span>
                    </button>
                    <!-- /ko -->
                </div>
                <!-- /ko -->
                <!-- /ko -->
            </div>
        </div>
        <!-- /ko -->
        </div>
    </div>
</div>
<!-- /ko -->
