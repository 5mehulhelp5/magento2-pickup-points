<div id="innosend-pickup-points-container"
     data-bind="visible: isPickupPointsShippingMethodSelected()"
>
    <!-- Translation hints for dynamic admin-configurable checkout text. -->
    <!-- ko if: false -->
    <!-- ko i18n: 'Load pickup points' --><!-- /ko -->
    <!-- ko i18n: 'Enter street, postcode and city to load pickup points.' --><!-- /ko -->
    <!-- ko i18n: 'Unable to load pickup points.' --><!-- /ko -->
    <!-- ko i18n: 'Search on map' --><!-- /ko -->
    <!-- /ko -->

    <!-- ko if: isPickupPointsShippingMethodSelected() -->
        <!-- ko if: selectedPickupPointDisplay() -->
        <!-- ko template: { name: getSelectedTemplate(), data: $data } --><!-- /ko -->
        <!-- /ko -->

        <!-- ko ifnot: selectedPickupPointDisplay() -->
            <!-- Show loading when loading -->
            <div class="innosend-pickup-points-loading" data-bind="visible: isLoading()">
                <div class="loading-message"><!-- ko i18n: 'Loading pickup points...' --><!-- /ko --></div>
            </div>

            <button
                type="button"
                class="action secondary innosend-pickup-points-reload"
                data-bind="visible: !isLoading(), click: refreshPickupPointsForCurrentAddress"
            >
                <span data-bind="i18n: getButtonLoadingText()"></span>
            </button>

            <!-- Show error message when no pickup points found -->
            <!-- ko if: errorMessage() && !isLoading() -->
            <div class="innosend-pickup-points-error">
                <div class="error-message">
                    <strong><!-- ko i18n: 'No Pickup Points Available' --><!-- /ko --></strong>
                    <p data-bind="i18n: errorMessage()"></p>
                </div>
                <!-- ko if: shouldShowMap() -->
                <button
                    type="button"
                    class="action primary innosend-pickup-points-open-map"
                    data-bind="click: openMapForFallback"
                >
                    <span><!-- ko i18n: 'Search on map' --><!-- /ko --></span>
                </button>
                <!-- /ko -->
            </div>
            <!-- /ko -->
        <!-- /ko -->

        <div data-bind="visible: isModalVisible()">
            <!-- ko template: 'Innosend_PickupPoints/pickup-points/modal' --><!-- /ko -->
        </div>
    <!-- /ko -->
</div>
