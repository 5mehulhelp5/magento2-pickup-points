<!-- ko if: isVisible() && pickupPoint() !== null -->
<div class="shipping-information">
  <div class="pickup-point-address">
    <div class="shipping-information-title">
      <span data-bind="i18n: 'Pickup Point:'"></span>
      <button class="action action-edit" data-bind="click: back">
        <span data-bind="i18n: 'edit'"></span>
      </button>
    </div>
    <div class="shipping-information-content">
      <div class="pickup-point-content-wrapper">
        <div class="pickup-point-info">
          <!-- ko if: pickupPoint().pickup_point_name -->
          <div class="pickup-point-name" data-bind="text: pickupPoint().pickup_point_name"></div>
          <!-- /ko -->
          <!-- ko if: pickupPoint().pickup_point_address -->
          <div class="pickup-point-address-text" data-bind="html: formattedAddress()"></div>
          <!-- /ko -->
        </div>
        <!-- ko if: carrierLogoUrl() -->
        <img
          data-bind="attr: { 
                                 src: carrierLogoUrl(), 
                                 alt: pickupPoint() ? (pickupPoint().pickup_point_carrier || pickupPoint().carrier || '') : '' 
                               }"
          class="pickup-point-logo"
        />
        <!-- /ko -->
      </div>
    </div>
  </div>
</div>
<!-- /ko -->
